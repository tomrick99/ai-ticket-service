spring:
  config:
    activate:
      on-profile: mysql
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/ai_ticket_service?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8}
    username: ${SPRING_DATASOURCE_USERNAME:}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: MysqlTicketPool
      maximum-pool-size: ${SPRING_DATASOURCE_MAXIMUM_POOL_SIZE:20}
      minimum-idle: ${SPRING_DATASOURCE_MINIMUM_IDLE:5}
      connection-timeout: ${SPRING_DATASOURCE_CONNECTION_TIMEOUT:30000}
      idle-timeout: ${SPRING_DATASOURCE_IDLE_TIMEOUT:600000}
      max-lifetime: ${SPRING_DATASOURCE_MAX_LIFETIME:1800000}
      validation-timeout: ${SPRING_DATASOURCE_VALIDATION_TIMEOUT:5000}
      connection-test-query: SELECT 1
      keepalive-time: ${SPRING_DATASOURCE_KEEPALIVE_TIME:300000}
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    validate-on-migrate: true
  h2:
    console:
      enabled: false
