spring:
  config:
    activate:
      on-profile: prod
  h2:
    console:
      enabled: false

server:
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: ${MANAGEMENT_HEALTH_SHOW_DETAILS:never}

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    AUDIT: ${LOG_LEVEL_AUDIT:INFO}
    com.example.aiticketservice: ${LOG_LEVEL_APP:INFO}
    org.springframework.web: WARN
    org.springframework.boot.actuate: INFO
    org.hibernate.SQL: OFF

app:
  ai:
    provider: ${APP_AI_PROVIDER:qwen}
    fallback: ${APP_AI_FALLBACK:none}
  qwen:
    base-url: ${QWEN_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
    api-key: ${DASHSCOPE_API_KEY:}
    model: ${QWEN_MODEL:qwen-plus}
    connect-timeout: ${QWEN_CONNECT_TIMEOUT:5s}
    read-timeout: ${QWEN_READ_TIMEOUT:60s}
    retry:
      max-attempts: ${QWEN_RETRY_MAX_ATTEMPTS:3}
      delay-ms: ${QWEN_RETRY_DELAY_MS:500}
  security:
    api-key: ${APP_SECURITY_API_KEY:}
