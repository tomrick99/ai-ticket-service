spring:
  application:
    name: ai-ticket-service
  autoconfigure:
    exclude:
      - org.springdoc.webmvc.ui.SwaggerConfig
  profiles:
    default: local
    group:
      prod:
        - mysql
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: ${SPRING_FLYWAY_BASELINE_ON_MIGRATE:false}
  sql:
    init:
      mode: never

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: ${MANAGEMENT_HEALTH_SHOW_DETAILS:always}
  health:
    db:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    AUDIT: ${LOG_LEVEL_AUDIT:INFO}
    com.example.aiticketservice: ${LOG_LEVEL_APP:INFO}
    org.springframework.web: ${LOG_LEVEL_SPRING_WEB:INFO}
    org.hibernate.SQL: OFF

app:
  ai:
    provider: ${APP_AI_PROVIDER:mock}
    fallback: ${APP_AI_FALLBACK:mock}
  qwen:
    base-url: ${QWEN_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
    api-key: ${DASHSCOPE_API_KEY:}
    model: ${QWEN_MODEL:qwen-plus}
    connect-timeout: ${QWEN_CONNECT_TIMEOUT:5s}
    read-timeout: ${QWEN_READ_TIMEOUT:60s}
    retry:
      max-attempts: ${QWEN_RETRY_MAX_ATTEMPTS:3}
      delay-ms: ${QWEN_RETRY_DELAY_MS:500}
  security:
    enabled: ${APP_SECURITY_ENABLED:true}
    api-key: ${APP_SECURITY_API_KEY:}
    header-name: ${APP_SECURITY_HEADER_NAME:X-API-Key}
    client-id-header: ${APP_SECURITY_CLIENT_ID_HEADER:X-Client-Id}
  audit:
    enabled: ${APP_AUDIT_ENABLED:true}
