services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-ticket-service:latest
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      QWEN_BASE_URL: ${QWEN_BASE_URL}
      QWEN_MODEL: ${QWEN_MODEL}
      APP_AI_PROVIDER: ${APP_AI_PROVIDER:-qwen}
      APP_AI_FALLBACK: ${APP_AI_FALLBACK:-none}
      APP_SECURITY_ENABLED: ${APP_SECURITY_ENABLED:-true}
      APP_SECURITY_API_KEY: ${APP_SECURITY_API_KEY}
      APP_SECURITY_HEADER_NAME: ${APP_SECURITY_HEADER_NAME:-X-API-Key}
      APP_SECURITY_CLIENT_ID_HEADER: ${APP_SECURITY_CLIENT_ID_HEADER:-X-Client-Id}
      APP_AUDIT_ENABLED: ${APP_AUDIT_ENABLED:-true}
      JAVA_OPTS: ${JAVA_OPTS:-}
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://127.0.0.1:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  mysql-data:
